<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ハコぶ</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#B8CCB8;font-family:'M PLUS Rounded 1c',sans-serif;}
:root{
  --bg:#F3F6F3;--sur:#FFF;--bdr:rgba(0,0,0,.07);
  --t1:#1A201B;--t2:#5C6E5E;--t3:#9FAE9F;
  --gr:#2D6A4F;--gr2:#52B788;--gr3:#D8F3DC;
  --or:#D4611A;--or2:#FEF0E6;
  --bl:#1E5EA8;--bl2:#EBF3FF;
  --re:#C0392B;--re2:#FDECEA;
  --pu:#5B21B6;--pu2:#EDE9FE;
  --r:14px;--r2:20px;--r3:28px;--tap:44px;
  --sh:0 2px 10px rgba(0,0,0,.08);
  --sh2:0 8px 28px rgba(0,0,0,.12);
}
/* ── SHELL ── */
.shell{display:flex;justify-content:center;padding:20px 0 60px;}
.phone{width:390px;height:844px;background:var(--bg);border-radius:48px;overflow:hidden;position:relative;flex-shrink:0;box-shadow:0 0 0 10px #1C1C1E,0 0 0 13px #2C2C2E,0 30px 90px rgba(0,0,0,.5);}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:120px;height:33px;background:#1C1C1E;border-radius:0 0 20px 20px;z-index:999;}
.sbar{position:absolute;top:0;left:0;right:0;height:50px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 24px 8px;font-size:12px;font-weight:700;color:var(--t1);z-index:100;pointer-events:none;}
/* ── SCREENS ── */
.scr{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .18s;}
.scr.on{opacity:1;pointer-events:all;}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{display:none;}
/* ── TABS ── */
.tabs{position:absolute;bottom:0;left:0;right:0;height:80px;background:var(--sur);border-top:1px solid var(--bdr);display:flex;justify-content:space-around;align-items:flex-start;padding-top:8px;z-index:200;}
.tb{display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;cursor:pointer;font-family:inherit;min-width:var(--tap);padding:0 10px;position:relative;}
.tb-i{font-size:22px;height:28px;display:flex;align-items:center;transition:transform .15s;}
.tb-l{font-size:10px;color:var(--t3);font-weight:500;}
.tb.on .tb-l{color:var(--gr);font-weight:700;}
.tb.on .tb-i{transform:scale(1.1);}
.tbadge{position:absolute;top:-1px;right:3px;min-width:16px;height:16px;border-radius:8px;background:var(--or);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 3px;}
/* ── HEADER ── */
.hdr{background:var(--sur);border-bottom:1px solid var(--bdr);padding:50px 18px 13px;flex-shrink:0;}
.hdr-row{display:flex;align-items:center;gap:10px;}
.hdr-title{font-size:18px;font-weight:700;color:var(--t1);flex:1;}
.back{width:var(--tap);height:var(--tap);border:none;background:var(--bg);border-radius:12px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t1);flex-shrink:0;}
/* ── BUTTONS ── */
.btn{display:flex;align-items:center;justify-content:center;gap:7px;border:none;font-family:inherit;cursor:pointer;font-weight:700;border-radius:var(--r2);transition:opacity .12s,transform .1s;width:100%;}
.btn:active{opacity:.8;transform:scale(.97);}
.btn-g{background:var(--gr);color:#fff;padding:14px;font-size:15px;}
.btn-sub{background:var(--bg);color:var(--t1);padding:12px;font-size:14px;}
.btn-ghost{background:transparent;color:var(--t2);padding:10px;font-size:13px;}
/* ── CARD ── */
.card{background:var(--sur);border-radius:var(--r2);box-shadow:var(--sh);overflow:hidden;}
/* ── SEC ── */
.sec{padding:13px 13px 0;}
.sec-lbl{font-size:11px;font-weight:700;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
/* ── TOAST ── */
.toast{position:absolute;bottom:92px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--t1);color:#fff;padding:10px 18px;border-radius:30px;font-size:13px;font-weight:500;white-space:nowrap;z-index:9999;opacity:0;transition:all .22s;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
/* ── MODAL ── */
.modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.32);z-index:800;opacity:0;pointer-events:none;transition:opacity .22s;display:flex;flex-direction:column;justify-content:flex-end;}
.modal-bg.on{opacity:1;pointer-events:all;}
.modal-sheet{background:var(--sur);border-radius:24px 24px 0 0;padding:0 0 40px;transform:translateY(100%);transition:transform .26s cubic-bezier(.32,.72,0,1);overflow-y:auto;}
.modal-bg.on .modal-sheet{transform:none;}
.mhandle{width:36px;height:4px;background:var(--bdr);border-radius:2px;margin:14px auto;}
.minner{padding:0 18px 8px;}
.mtitle{font-size:17px;font-weight:700;color:var(--t1);margin-bottom:14px;}
/* ── FORMS ── */
.field{margin-bottom:13px;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--t2);margin-bottom:6px;}
.field input{width:100%;padding:12px 14px;border-radius:var(--r);border:1.5px solid var(--bdr);background:var(--bg);font-family:inherit;font-size:14px;color:var(--t1);outline:none;}
.field input:focus{border-color:var(--gr2);}
.chips{display:flex;flex-wrap:wrap;gap:7px;}
.chip{padding:8px 14px;border-radius:20px;border:1.5px solid var(--bdr);background:var(--bg);color:var(--t2);font-size:13px;font-family:inherit;cursor:pointer;transition:all .13s;min-height:var(--tap);display:inline-flex;align-items:center;}
.chip.on{background:var(--gr3);border-color:var(--gr2);color:var(--gr);font-weight:700;}
/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes hpop{0%{transform:scale(.4);opacity:1}80%{transform:scale(1.4);opacity:.8}100%{transform:scale(1);opacity:0}}
.anim{animation:fadeUp .25s ease both;}

/* ════ SPLASH ════ */
#s-splash{background:linear-gradient(165deg,#091A0F 0%,#143322 55%,#091A0F 100%);}
.sp{height:100%;display:flex;flex-direction:column;padding:65px 26px 36px;}
.sp-logo{width:60px;height:60px;background:var(--gr2);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:18px;box-shadow:0 8px 20px rgba(82,183,136,.4);}
.sp-h{font-size:32px;font-weight:800;color:#fff;line-height:1.25;margin-bottom:8px;}
.sp-p{font-size:13px;color:rgba(255,255,255,.45);line-height:1.7;margin-bottom:26px;}
.sp-feats{display:flex;flex-direction:column;gap:9px;margin-bottom:26px;}
.sp-feat{display:flex;gap:11px;background:rgba(255,255,255,.06);border-radius:13px;padding:11px 12px;align-items:flex-start;}
.sp-feat-icon{font-size:17px;flex-shrink:0;margin-top:1px;}
.sp-feat-text{font-size:12.5px;color:rgba(255,255,255,.7);line-height:1.55;}
.sp-feat-text strong{color:#fff;}
.sp-start{width:100%;padding:15px;border-radius:var(--r3);background:var(--gr2);color:#fff;font-size:15px;font-weight:800;border:none;font-family:inherit;cursor:pointer;margin-bottom:9px;box-shadow:0 6px 20px rgba(82,183,136,.35);}
.sp-login{width:100%;padding:12px;border-radius:var(--r3);background:transparent;color:rgba(255,255,255,.28);font-size:13px;border:none;font-family:inherit;cursor:pointer;}

/* ════ HOME ════ */
/* Proposal card */
.prop-outer{padding:58px 13px 0;}
.prop-card{border-radius:var(--r3);min-height:195px;padding:20px;position:relative;overflow:hidden;cursor:grab;user-select:none;transition:box-shadow .2s;}
.prop-card:active{cursor:grabbing;}
.prop-bg{position:absolute;inset:0;}
.prop-content{position:relative;z-index:1;}
.prop-tag{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.22);backdrop-filter:blur(6px);border-radius:20px;padding:4px 10px;font-size:10px;font-weight:700;color:#fff;letter-spacing:.5px;margin-bottom:10px;}
.prop-title{font-size:20px;font-weight:800;color:#fff;line-height:1.3;margin-bottom:7px;}
.prop-desc{font-size:12.5px;color:rgba(255,255,255,.82);line-height:1.6;margin-bottom:15px;}
.prop-btns{display:flex;gap:8px;}
.p-adopt{flex:2;padding:11px;background:rgba(255,255,255,.95);border:none;border-radius:var(--r);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;}
.p-adopt:active{opacity:.8;}
.p-skip{flex:1;padding:11px;background:rgba(255,255,255,.18);border:none;border-radius:var(--r);font-family:inherit;font-size:13px;font-weight:600;color:#fff;cursor:pointer;}
/* swipe overlay */
.sw-over{position:absolute;inset:0;border-radius:var(--r3);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#fff;opacity:0;pointer-events:none;}
.sw-L{background:rgba(192,57,43,.18);border:3px solid rgba(192,57,43,.4);}
.sw-R{background:rgba(45,106,79,.18);border:3px solid rgba(45,106,79,.4);}
/* pager */
.pdots{display:flex;gap:5px;justify-content:center;padding:9px 0 0;}
.pdot{width:5px;height:5px;border-radius:50%;background:rgba(45,106,79,.18);transition:all .2s;}
.pdot.on{width:14px;border-radius:3px;background:var(--gr);}
/* projects */
.proj-row{display:flex;gap:9px;overflow-x:auto;padding-bottom:3px;scrollbar-width:none;}
.proj-row::-webkit-scrollbar{display:none;}
.proj-pill{flex-shrink:0;width:130px;background:var(--sur);border-radius:var(--r2);padding:12px 12px;box-shadow:var(--sh);cursor:pointer;border:1.5px solid var(--bdr);transition:transform .12s;}
.proj-pill:active{transform:scale(.95);}
.pp-em{font-size:19px;margin-bottom:5px;}
.pp-name{font-size:11.5px;font-weight:700;color:var(--t1);margin-bottom:4px;line-height:1.3;}
.pp-bar{height:4px;background:var(--bg);border-radius:2px;overflow:hidden;margin-bottom:3px;}
.pp-fill{height:100%;border-radius:2px;}
.pp-meta{font-size:10px;color:var(--t3);}
.pp-urg{font-size:10px;color:var(--or);font-weight:700;}
/* invisible */
.inv-card{border-radius:var(--r2);box-shadow:var(--sh);overflow:hidden;background:var(--sur);}
.inv-hdr{display:flex;align-items:center;gap:8px;padding:12px 13px;border-bottom:1px solid var(--bdr);cursor:pointer;}
.inv-hdr:active{background:var(--bg);}
.inv-dot{width:7px;height:7px;border-radius:50%;background:var(--or);animation:pulse 2s infinite;flex-shrink:0;}
.inv-title{font-size:13px;font-weight:700;color:var(--t1);flex:1;}
.inv-cnt{background:var(--or2);color:var(--or);border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700;}
.inv-row{display:flex;align-items:center;gap:9px;padding:10px 13px;border-bottom:1px solid var(--bdr);font-size:13px;color:var(--t1);}
.inv-em{font-size:14px;flex-shrink:0;}
.inv-cta{display:flex;align-items:center;gap:6px;padding:11px 13px;background:var(--gr3);font-size:13px;font-weight:700;color:var(--gr);cursor:pointer;}
.inv-cta:active{opacity:.8;}
/* tasks */
.tlist{border-radius:var(--r2);box-shadow:var(--sh);overflow:hidden;background:var(--sur);}
.trow{display:flex;align-items:center;gap:10px;padding:12px 13px;border-bottom:1px solid var(--bdr);cursor:pointer;transition:background .1s;}
.trow:active{background:var(--bg);}
.trow:last-child{border:none;}
.tchk{width:24px;height:24px;border-radius:8px;border:2px solid var(--bdr);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;transition:all .18s;}
.tchk.done{background:var(--gr);border-color:var(--gr);color:#fff;}
.tbody{flex:1;min-width:0;}
.tname{font-size:14px;font-weight:500;color:var(--t1);}
.tname.done{text-decoration:line-through;color:var(--t3);}
.tmeta{display:flex;align-items:center;gap:5px;margin-top:3px;flex-wrap:wrap;}
.wtag{font-size:10px;font-weight:600;padding:2px 6px;border-radius:8px;}
.wt-m{background:var(--or2);color:var(--or);}
.wt-p{background:var(--bl2);color:var(--bl);}
.wt-b{background:var(--gr3);color:var(--gr);}
.dtag{font-size:10px;color:var(--t2);}
.dtag.urg{color:var(--re);font-weight:700;}
.tarr{font-size:14px;color:var(--t3);}
.add-row{display:flex;align-items:center;gap:10px;padding:12px 13px;cursor:pointer;color:var(--gr);font-size:14px;font-weight:700;}
.add-row:active{background:var(--bg);}

/* ════ CHAT ════ */
#s-chat{background:var(--bg);}
.chat-hdr{background:var(--sur);border-bottom:1px solid var(--bdr);padding:50px 15px 11px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.ai-av{width:36px;height:36px;background:var(--gr);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.ai-name{font-size:15px;font-weight:700;color:var(--t1);}
.ai-st{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--gr);}
.ldot{width:5px;height:5px;border-radius:50%;background:var(--gr);animation:pulse 2s infinite;}
.c-reset{margin-left:auto;padding:7px 11px;background:var(--bg);border:none;border-radius:10px;font-family:inherit;font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;}
.chat-body{flex:1;padding:12px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.chat-body::-webkit-scrollbar{display:none;}
.msg{display:flex;flex-direction:column;max-width:90%;}
.msg.ai{align-self:flex-start;}
.msg.user{align-self:flex-end;}
.bub{padding:11px 14px;font-size:14px;line-height:1.65;white-space:pre-wrap;word-break:break-word;}
.msg.ai .bub{background:var(--sur);color:var(--t1);border-radius:4px var(--r2) var(--r2) var(--r2);box-shadow:var(--sh);}
.msg.user .bub{background:var(--gr);color:#fff;border-radius:var(--r2) var(--r2) 4px var(--r2);}
.mtime{font-size:10px;color:var(--t3);margin-top:3px;padding:0 4px;}
.msg.user .mtime{text-align:right;}
.typing{align-self:flex-start;background:var(--sur);border-radius:4px var(--r2) var(--r2) var(--r2);padding:13px 16px;display:flex;gap:5px;box-shadow:var(--sh);}
.td{width:7px;height:7px;border-radius:50%;background:var(--t3);animation:pulse 1.2s ease-in-out infinite;}
.td:nth-child(2){animation-delay:.16s;}
.td:nth-child(3){animation-delay:.32s;}
/* choices */
.cwrap{align-self:flex-start;display:flex;flex-direction:column;gap:6px;max-width:97%;}
.cbtn{display:flex;align-items:center;gap:9px;background:var(--sur);border:1.5px solid var(--bdr);border-radius:var(--r2);padding:11px 13px;font-size:13px;font-weight:500;color:var(--t1);text-align:left;cursor:pointer;font-family:inherit;min-height:var(--tap);box-shadow:var(--sh);transition:all .12s;width:100%;}
.cbtn:hover{border-color:var(--gr2);background:var(--gr3);}
.cbtn:active{transform:scale(.98);}
.cbtn:disabled{opacity:.35;pointer-events:none;}
.cicon{width:28px;height:28px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
/* ingredient picker */
.ing-wrap{align-self:flex-start;max-width:99%;background:var(--sur);border-radius:var(--r2);padding:13px;box-shadow:var(--sh);}
.ing-lbl{font-size:12px;color:var(--t2);margin-bottom:9px;line-height:1.5;}
.ing-cat{font-size:10px;font-weight:700;color:var(--t3);margin:8px 0 4px;}
.ing-chips{display:flex;flex-wrap:wrap;gap:5px;}
.ing-chip{padding:6px 11px;border-radius:20px;border:1.5px solid var(--bdr);background:var(--bg);color:var(--t2);font-size:12px;font-family:inherit;cursor:pointer;transition:all .12s;}
.ing-chip.on{background:var(--gr3);border-color:var(--gr2);color:var(--gr);font-weight:700;}
.ing-done{margin-top:10px;width:100%;padding:12px;background:var(--gr);color:#fff;border:none;border-radius:var(--r);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;}
/* chat footer */
.chat-ft{padding:9px 12px 28px;background:var(--sur);border-top:1px solid var(--bdr);flex-shrink:0;}
.input-row{display:flex;gap:7px;align-items:flex-end;}
.ibox{flex:1;background:var(--bg);border-radius:var(--r2);padding:10px 13px;display:flex;align-items:flex-end;gap:8px;}
.chat-ta{flex:1;border:none;background:transparent;font-family:inherit;font-size:14px;color:var(--t1);outline:none;resize:none;min-height:20px;max-height:80px;line-height:1.5;}
.chat-ta::placeholder{color:var(--t3);}
.mic-btn{width:var(--tap);height:var(--tap);border-radius:50%;background:var(--bg);border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.mic-btn.on{background:var(--or);}
.send-btn{width:var(--tap);height:var(--tap);border-radius:50%;background:var(--gr);color:#fff;border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 3px 10px rgba(45,106,79,.35);}
.send-btn:disabled{opacity:.3;}
.lveil{position:absolute;inset:0;background:rgba(243,246,243,.8);backdrop-filter:blur(3px);display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:300;}
.lveil.on{display:flex;}
.spinner{width:26px;height:26px;border-radius:50%;border:3px solid var(--bdr);border-top-color:var(--gr);animation:spin .55s linear infinite;}

/* ════ CALENDAR ════ */
#s-cal{background:var(--bg);}
.cal-hdr{background:var(--sur);border-bottom:1px solid var(--bdr);padding:50px 18px 12px;flex-shrink:0;}
.cal-hdr-row{display:flex;align-items:center;justify-content:space-between;}
.cal-month{font-size:17px;font-weight:700;color:var(--t1);}
.cal-range{font-size:11px;color:var(--t2);margin-top:2px;}
.cal-nav-btns{display:flex;gap:6px;}
.cnb{width:34px;height:34px;border:none;background:var(--bg);border-radius:10px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t1);}
.cal-leg{display:flex;gap:12px;padding:8px 16px;background:var(--sur);border-bottom:1px solid var(--bdr);flex-shrink:0;}
.cl-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--t2);}
.cl-dot{width:8px;height:8px;border-radius:2px;}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);background:var(--sur);border-bottom:1px solid var(--bdr);flex-shrink:0;}
.cdh{text-align:center;padding:7px 2px;}
.cdh-lbl{display:block;font-size:9px;color:var(--t3);font-weight:700;margin-bottom:2px;}
.cdh-num{display:flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;margin:0 auto;font-size:12px;font-weight:700;color:var(--t1);}
.cdh-num.today{background:var(--gr);color:#fff;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);background:var(--sur);border-bottom:1px solid var(--bdr);min-height:80px;flex-shrink:0;}
.ccol{border-right:1px solid var(--bdr);padding:3px 2px;min-height:70px;}
.ccol:last-child{border:none;}
.cchip{border-radius:4px;padding:2px 3px;font-size:8.5px;line-height:1.3;margin-bottom:2px;cursor:pointer;display:block;overflow:hidden;}
.cchip.mama{background:var(--or2);color:#8A3A0A;}
.cchip.papa{background:var(--bl2);color:#1A4EA8;}
.cchip.both{background:var(--gr3);color:var(--gr);}
.cchip.done{opacity:.4;}
/* project detail card */
.pjcard{background:var(--sur);border-radius:var(--r2);box-shadow:var(--sh);overflow:hidden;margin-bottom:10px;}
.pjcard-hdr{display:flex;align-items:center;gap:11px;padding:13px;cursor:pointer;}
.pjcard-hdr:active{background:var(--bg);}
.pj-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.pj-info{flex:1;}
.pj-name{font-size:14px;font-weight:700;color:var(--t1);}
.pj-sub{font-size:11px;color:var(--t2);margin-top:1px;}
.pj-pct{font-size:19px;font-weight:800;}

<script>
/* ═══════════════════════════════════════════════════════
   ハコぶ v9 — 完全再設計
   
   設計方針:
   ✓ onclick属性を一切使わない → addEventListener のみ
   ✓ innerHTML生成を最小限に
   ✓ data-*属性でパラメータ受け渡し
   ✓ 全関数をモジュールパターンで整理
   ✓ エラー箇所を全修正
═══════════════════════════════════════════════════════ */

/* ── Clock ── */
(function clk(){
  const el = document.getElementById('clk');
  if(el){ const n=new Date(); el.textContent=n.getHours()+':'+String(n.getMinutes()).padStart(2,'0'); }
  setTimeout(clk, 30000);
})();

/* ── Toast ── */
let _tt = null;
function toast(msg){
  const el = document.getElementById('toast');
  if(!el) return;
  clearTimeout(_tt);
  el.textContent = msg;
  el.classList.add('show');
  _tt = setTimeout(()=>el.classList.remove('show'), 2800);
}

/* ── Time helper ── */
function timeStr(){
  return new Date().toLocaleTimeString('ja',{hour:'2-digit',minute:'2-digit'});
}

/* ═══════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════ */
const SK = 'hakobu_v10';

function mkState(){
  return {
    family: { name:'田中', mama:'さくら', papa:'けんじ', childAge:5, childEvent:'4月から入園' },
    prefs:  { liked:[], rejected:[], papaReturn:'21時以降', shopDay:'週末', papaGood:['ゴミ出し','週末料理'], isPro:false },
    projects: [
      { id:'nyuuen', name:'幼稚園入園準備', icon:'🌸', color:'#D4611A', bg:'#FEF0E6', deadline:'4月入園',
        tasks:[
          {id:'n1',name:'入園説明会の参加',      who:'mama',done:true, urgent:false,due:''},
          {id:'n2',name:'名前シール注文',          who:'papa',done:true, urgent:false,due:''},
          {id:'n3',name:'保育料振込',              who:'mama',done:true, urgent:false,due:''},
          {id:'n4',name:'制服のサイズ確認・注文',  who:'mama',done:false,urgent:false,due:''},
          {id:'n5',name:'保護者会の出欠回答',      who:'mama',done:false,urgent:true, due:'今週金曜'},
          {id:'n6',name:'入園式の衣装を決める',    who:'both',done:false,urgent:false,due:''},
        ]},
      { id:'okinawa', name:'沖縄旅行計画', icon:'✈️', color:'#1E5EA8', bg:'#EBF3FF', deadline:'夏休み',
        tasks:[
          {id:'o1',name:'パスポートの有効期限確認', who:'papa',done:false,urgent:true, due:'今週中'},
          {id:'o2',name:'旅行予算を夫婦で決める',   who:'both',done:false,urgent:false,due:''},
          {id:'o3',name:'航空券・ホテルの比較',      who:'papa',done:false,urgent:false,due:''},
        ]},
    ],
    stats: { sessions:0 },
  };
}

let ST = null;
let calOff = 0;

async function loadST(){
  if(ST) return ST;
  try{
    if(!window.storage) throw new Error('no storage');
    const r = await window.storage.get(SK);
    if(r){
      const saved = JSON.parse(r.value);
      const def = mkState();
      // deep merge: 保存データにmkStateのデフォルト値を補完
      ST = {
        family:   Object.assign({}, def.family,   saved.family   || {}),
        prefs:    Object.assign({}, def.prefs,     saved.prefs    || {}),
        projects: (saved.projects && saved.projects.length) ? saved.projects : def.projects,
        stats:    Object.assign({}, def.stats,     saved.stats    || {}),
      };
      // 配列フィールドの保証
      if(!Array.isArray(ST.prefs.liked))    ST.prefs.liked    = [];
      if(!Array.isArray(ST.prefs.rejected)) ST.prefs.rejected = [];
      if(!Array.isArray(ST.prefs.papaGood)) ST.prefs.papaGood = def.prefs.papaGood;
    } else {
      ST = mkState();
    }
  }catch(_){ ST = mkState(); }
  return ST;
}

async function saveST(){
  if(!ST) return;
  try{
    if(!window.storage) return;
    await window.storage.set(SK, JSON.stringify(ST));
  }catch(_){}
}

function pct(proj){
  if(!proj||!proj.tasks||!proj.tasks.length) return 0;
  return Math.round(proj.tasks.filter(t=>t.done).length / proj.tasks.length * 100);
}

function allTasks(s){
  if(!s||!s.projects) return [];
  return s.projects.flatMap(p=>(p.tasks||[]).map(t=>({...t,projName:p.name,projIcon:p.icon,projId:p.id,projColor:p.color})));
}

/* ═══════════════════════════════════════════════════════
   NAVIGATION  (onclick属性なし)
═══════════════════════════════════════════════════════ */
let curScr = 'splash';
let chatCtx = null;

function navTo(id, ctx){
  if(id==='settings'){ renderSettings(); return; }
  ['splash','home','chat','cal','mem'].forEach(s=>{
    const el = document.getElementById('s-'+s);
    if(el) el.classList.toggle('on', s===id);
  });
  curScr = id;
  // ctxが明示的に渡された場合のみ更新（undefinedはタブバー等からの遷移）
  if(ctx !== undefined) chatCtx = ctx;
  if(id==='home') renderHome();
  if(id==='chat') openChat();
  if(id==='cal')  renderCal();
  if(id==='mem')  renderMem();
}

// Tab bar delegation (全タブに一括登録)
document.querySelectorAll('.tb[data-nav]').forEach(btn=>{
  btn.addEventListener('click',()=>navTo(btn.dataset.nav));
});
document.getElementById('sp-start-btn').addEventListener('click',()=>navTo('home'));
document.getElementById('sp-login-btn').addEventListener('click', ()=>navTo('home'));
document.getElementById('chat-back').addEventListener('click',  ()=>navTo('home'));
document.getElementById('chat-reset').addEventListener('click', ()=>resetChat());
document.getElementById('cal-prev').addEventListener('click',   ()=>{calOff--;renderCal();});
document.getElementById('cal-next').addEventListener('click',   ()=>{calOff++;renderCal();});

/* ═══════════════════════════════════════════════════════
   PROPOSALS — 献立以外の家族課題も提案
═══════════════════════════════════════════════════════ */
const PROPS = [
  {
    tag:'🍽️ 今夜の献立',
    bg:'linear-gradient(135deg,#D4611A,#F08040)',
    adoptColor:'#D4611A',
    adoptLabel:'食材を選んで決める →',
    getTitle: s=>'今夜の献立を食材から決めませんか？',
    getDesc:  s=>{
      const d=['日','月','火','水','木','金','土'][new Date().getDay()];
      const isWe=[0,6].includes(new Date().getDay());
      return `今日は${d}曜日。${isWe?'パパも在宅なので一緒に作れます。':`パパの帰宅は${s.prefs?.papaReturn||'夜'}。`}冷蔵庫の食材を教えてください。`;
    },
    action:'kondate',
  },
  {
    tag:'📋 プロジェクト',
    bg:'linear-gradient(135deg,#B04800,#D4611A)',
    adoptColor:'#B04800',
    adoptLabel:'AIに相談する →',
    getTitle: s=>{ const p=s.projects[0]; return p?`「${p.name}」が${pct(p)}%で止まっています`:'プロジェクトを前進させましょう'; },
    getDesc:  s=>{ const p=s.projects[0]; const u=p&&p.tasks.find(t=>!t.done&&t.urgent); return u?`⚠️「${u.name}」（${u.due||'要対応'}）が期限に近づいています。`:'次のタスクをAIと一緒に整理しましょう。'; },
    action:'project_nyuuen',
  },
  {
    tag:'👁 名もなき家事',
    bg:'linear-gradient(135deg,#5B21B6,#7C3AED)',
    adoptColor:'#5B21B6',
    adoptLabel:'AIで整理する →',
    getTitle: _=>'今週の名もなき家事を整理しましょう',
    getDesc:  s=>`見えていない家事を${getInvItems(s).length}件AIが検出。パパのTimeTreeに共有できます。`,
    action:'invisible',
  },
  {
    tag:'⚖️ 家事バランス',
    bg:'linear-gradient(135deg,#055442,#2D6A4F)',
    adoptColor:'#055442',
    adoptLabel:'パパのタスクを作る →',
    getTitle: _=>'ママの負担が72%に達しています',
    getDesc:  s=>`今週パパができるタスクを3件提案。${(s.prefs?.papaGood||['ゴミ出し'])[0]}が得意なパパに合わせます。`,
    action:'balance',
  },
  {
    tag:'✈️ 旅行計画',
    bg:'linear-gradient(135deg,#1A3A8A,#1E5EA8)',
    adoptColor:'#1A3A8A',
    adoptLabel:'依頼文を作る →',
    getTitle: _=>'沖縄旅行計画が3週間止まっています',
    getDesc:  _=>'パスポート確認がまだ。AIがパパへの依頼LINEを作ります。送るだけで動いてもらえます。',
    action:'project_okinawa',
  },
];

let pIdx = 0;
let swX=0, swDx=0, swOn=false;

async function renderProp(){
  const s = await loadST();
  const p = PROPS[pIdx];
  const _bg = document.getElementById('prop-bg');
  if(!_bg) return;
  document.getElementById('prop-bg').style.cssText = `position:absolute;inset:0;background:${p.bg};`;
  document.getElementById('prop-tag').textContent   = p.tag;
  document.getElementById('prop-title').textContent = p.getTitle(s);
  document.getElementById('prop-desc').textContent  = p.getDesc(s);
  const ab = document.getElementById('prop-adopt');
  ab.textContent = p.adoptLabel;
  ab.style.color = p.adoptColor;
  // dots
  const d = document.getElementById('pdots');
  d.innerHTML = '';
  PROPS.forEach((_,i)=>{ const dot=document.createElement('div'); dot.className='pdot'+(i===pIdx?' on':''); d.appendChild(dot); });
}

document.getElementById('prop-adopt').addEventListener('click', ()=>{
  const p = PROPS[pIdx];
  navTo('chat', {action: p.action});
});
document.getElementById('prop-skip').addEventListener('click', async()=>{
  const s = await loadST();
  if(PROPS[pIdx].action==='kondate'){ s.prefs.rejected.push('skip_'+Date.now()); await saveST(); }
  pIdx = (pIdx+1)%PROPS.length;
  renderProp();
});

/* swipe */
const pc = document.getElementById('prop-card');
function swStart(e){ swX=e.touches?e.touches[0].clientX:e.clientX; swDx=0; swOn=true; pc.style.transition='none'; }
function swMove(e){
  if(!swOn) return;
  swDx=(e.touches?e.touches[0].clientX:e.clientX)-swX;
  pc.style.transform=`translateX(${swDx*.3}px) rotate(${swDx*.04}deg)`;
  document.getElementById('sw-L').style.opacity=swDx<-30?Math.min(.9,Math.abs(swDx)/100):0;
  document.getElementById('sw-R').style.opacity=swDx>30?Math.min(.9,swDx/100):0;
  if(e.cancelable) e.preventDefault();
}
function swEnd(){
  if(!swOn) return; swOn=false;
  pc.style.transition='transform .28s cubic-bezier(.34,1.56,.64,1)';
  pc.style.transform='';
  document.getElementById('sw-L').style.opacity=0;
  document.getElementById('sw-R').style.opacity=0;
  if(swDx<-60) document.getElementById('prop-skip').click();
  else if(swDx>60) document.getElementById('prop-adopt').click();
  swDx=0;
}
pc.addEventListener('touchstart',swStart,{passive:false});
pc.addEventListener('touchmove', swMove, {passive:false});
pc.addEventListener('touchend',  swEnd);
pc.addEventListener('mousedown', swStart);
pc.addEventListener('mousemove', swMove);
pc.addEventListener('mouseup',   swEnd);
pc.addEventListener('mouseleave',()=>{ if(swOn){swOn=false;swDx=0;pc.style.transform='';} });

function toggleTask(taskId,projId,el){
  if(!ST) return;
  const proj=ST.projects.find(p=>p.id===projId);
  const task=proj&&proj.tasks.find(t=>t.id===taskId);
  if(!task) return;
  task.done=!task.done; saveST();
  el.classList.toggle('done',task.done);
  el.textContent=task.done?'✓':'';
  const row=el.closest('.trow');
  if(row) row.querySelector('.tname')?.classList.toggle('done',task.done);
  if(task.done){ toast('✓ 完了！'); burst(); }

function burst(){
  const ph=document.getElementById('phone');
  if(!ph) return;
  ['✨','⭐','💚','🎉'].forEach((em,i)=>{
    const b=document.createElement('div'); b.className='burst'; b.textContent=em;
    const a=(i/4)*Math.PI*2;
    b.style.cssText=`left:${160+Math.cos(a)*40}px;top:${420+Math.sin(a)*40}px;animation-delay:${i*.06}s;`;
    ph.appendChild(b); setTimeout(()=>b.remove(),800);
  });
}

function weekDates(off){
  const today=new Date(), dow=today.getDay();
  const mon=new Date(today); mon.setDate(today.getDate()-(dow===0?6:dow-1)+off*7);
  return Array.from({length:7},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
}

let chatReady=false, chatCtxKey='', chatHistory=[], ingSelected=[], micOn=false;

function resetChat(){ chatReady=false; chatCtxKey=''; chatHistory=[]; ingSelected=[]; document.getElementById('chat-body').innerHTML=''; openChat(); }

async function openChat(){
  const key=JSON.stringify(chatCtx||null);
  // 同じコンテキストで既に初期化済みならそのまま維持
  if(chatReady && key===chatCtxKey) return;
  chatReady=true; chatCtxKey=key; chatHistory=[]; ingSelected=[];
  const _cb = document.getElementById('chat-body'); if(_cb) _cb.innerHTML='';
  const s=await loadST();
  s.stats.sessions=(s.stats.sessions||0)+1; await saveST();
  const ctx=chatCtx||null;
  const action=ctx&&ctx.action;

  if(action==='kondate'){
    addAI('献立を一緒に決めましょう 🍽️\n\n今ある食材を教えてください。あるもので作れる最適な献立を提案します。');
    setTimeout(addIngPicker, 500);
  }else if(action&&action.startsWith('project_')){
    const pid=(ctx&&ctx.projectId)||action.replace('project_','');
    const proj=s.projects.find(p=>p.id===pid);
    if(proj){
      const p2=pct(proj); const nx=proj.tasks.find(t=>!t.done);
      addAI(`「${proj.name}」を確認しました ${proj.icon}\n\n現在 ${p2}% 完了。${nx?`\n次：「${nx.name}」（${nx.who==='mama'?'ママ':nx.who==='papa'?'パパ':'二人で'}担当）`:'\nすべて完了済みです！'}\n\n何をしますか？`);
      setTimeout(()=>addChoices([
        {icon:'▶️',text:'今すぐ次のタスクを整理する', key:'proj_next'},
        {icon:'📨',text:'パパへの依頼LINEを作る',     key:'proj_papa'},
        {icon:'🤖',text:'AIに全部計画してもらう',     key:'proj_all'},
        {icon:'🔄',text:'別の相談をする',              key:'restart'},
      ]),400);
    }
  }else if(action==='invisible'){
    const items=getInvItems(s);
    const list=items.map((it,i)=>`${i+1}. ${it.icon} ${it.name}`).join('\n');
    addAI(`名もなき家事を ${items.length} 件検出しました 👁\n\n${list}\n\nどうしますか？`);
    setTimeout(()=>addChoices([
      {icon:'📅',text:'全部TimeTreeにタスク追加する',key:'inv_add'},
      {icon:'👨',text:'パパに割り振れるものを選ぶ', key:'inv_papa'},
      {icon:'🤖',text:'AIに優先順位をつけてもらう', key:'inv_sort'},
    ]),400);
  }else if(action==='balance'){
    addAI(`家事バランスを分析しました ⚖️\n\nママ 72%：パパ 28%\n\nパパに今週できるタスクを提案します。`);
    setTimeout(async()=>{
      chatHistory.push({role:'user',content:'パパに今週できる家事タスクを3件、得意なこと・帰宅時間を考慮して具体的に提案してください。'});
      await callAI();
    },500);
  }else if(action&&action.startsWith('member_')){
    const who=action.replace('member_','');
    const name=who==='mama'?s.family.mama+'さん（ママ）':s.family.papa+'さん（パパ）';
    addAI(`${name}へのタスク提案を作ります 🤖`);
    setTimeout(async()=>{
      chatHistory.push({role:'user',content:`${name}に合ったタスクを今週3件提案してください。`});
      await callAI();
    },500);
  }else{
    const dow=['日','月','火','水','木','金','土'][new Date().getDay()];
    const isWe=[0,6].includes(new Date().getDay());
    const urg=allTasks(s).find(t=>!t.done&&t.urgent);
    addAI(`こんにちは！${s.family.name}さん 👋\n\n今日は${dow}曜日${isWe?'、パパも在宅ですね':''}。`+(urg?`\n\n⚠️「${urg.name}」が期限に近づいています。`:'')+'\n\n今日は何を一緒に解決しますか？');
    setTimeout(()=>addChoices([
      {icon:'🍽️',text:'今夜の献立を食材から決める',key:'kondate'},
      {icon:'📋',text:'プロジェクトを前進させたい',key:'proj_menu'},
      {icon:'👁', text:'名もなき家事を整理したい', key:'invisible'},
      {icon:'⚖️',text:'パパへのタスクを作りたい', key:'balance'},
      {icon:'💬',text:'その他・なんでも相談したい',key:'free'},
    ]),400);
  }
}

/* 食材ピッカー */
const ING={
  '肉・魚':  ['鶏肉','豚肉','牛肉','ひき肉','鮭','たら','えび','ツナ'],
  '野菜':    ['玉ねぎ','にんじん','じゃがいも','ほうれん草','ブロッコリー','キャベツ','トマト','なす','きのこ'],
  '卵・豆腐':['卵','豆腐','厚揚げ','納豆','チーズ'],
  '主食・他':['ご飯','パスタ','うどん','パン','味噌','バター','めんつゆ'],
};

function addIngPicker(){
  ingSelected=[];
  const cb=document.getElementById('chat-body'); if(!cb) return;
  const w=document.createElement('div'); w.className='ing-wrap anim';
  const lbl=document.createElement('div'); lbl.className='ing-lbl'; lbl.textContent='今ある食材をタップしてください（複数OK）'; w.appendChild(lbl);
  for(const[cat,items] of Object.entries(ING)){
    const cl=document.createElement('div'); cl.className='ing-cat'; cl.textContent=cat; w.appendChild(cl);
    const cs=document.createElement('div'); cs.className='ing-chips';
    items.forEach(name=>{
      const c=document.createElement('button'); c.className='ing-chip'; c.textContent=name;
      c.addEventListener('click',()=>{ c.classList.toggle('on'); if(c.classList.contains('on')) ingSelected.push(name); else ingSelected=ingSelected.filter(i=>i!==name); });
      cs.appendChild(c);
    });
    w.appendChild(cs);
  }
  const done=document.createElement('button'); done.className='ing-done'; done.textContent='この食材で献立を考えてもらう ✓';
  done.addEventListener('click', async()=>{
    done.closest('.ing-wrap').querySelectorAll('button').forEach(b=>b.disabled=true);
    const ings=ingSelected.length?ingSelected.join('、'):'おまかせ（何でもOK）';
    addUser('今ある食材：'+ings);
    chatHistory.push({role:'user',content:`今ある食材：${ings}。これを使って今夜の献立を1つ提案してください。材料・調理時間・手順・担当者（ママ/パパ）を含めてください。`});
    await callAI();
    ingSelected=[];
  });
  w.appendChild(done); cb.appendChild(w); scrollChat();
}

/* choices */
async function handleChoice(key, extraData, wrapEl, choiceText){
  wrapEl.querySelectorAll('.cbtn').forEach(b=>b.disabled=true);
  if(key==='kondate')  { navTo('chat',{action:'kondate'}); return; }
  if(key==='invisible'){ navTo('chat',{action:'invisible'}); return; }
  if(key==='balance')  { navTo('chat',{action:'balance'}); return; }
  if(key==='restart')  { resetChat(); return; }
  if(key==='home')         { navTo('home'); return; }
  if(key==='open_settings'){ navTo('settings'); return; }
  if(key==='demo_mode'){
    loadST().then(async st=>{
      st.prefs.isPro=true; await saveST(st); ST=st;
      aiService.provider='mock';
      toast('🎭 デモモード有効');
      resetChat(); navTo('chat');
    }); return;
  }
  if(key==='proj_menu'){ const s=await loadST(); addAI('どのプロジェクトについて相談しますか？'); setTimeout(()=>addChoices(s.projects.map(p=>({icon:p.icon,text:p.name,key:'go_proj',extra:{projectId:p.id,action:'project_'+p.id}}))),400); return; }
  if(key==='go_proj'&&extraData){ navTo('chat',{action:extraData.action,projectId:extraData.projectId}); return; }
  if(key==='done'){ toast('🗓 TimeTreeに追加しました！'); addAI('TimeTreeに追加しました！他に何かありますか？'); setTimeout(()=>addChoices([{icon:'🔄',text:'別の相談をする',key:'restart'},{icon:'🏠',text:'ホームに戻る',key:'home'}]),400); return; }

  const topicMap={
    proj_next:'このプロジェクトの次にやるべきタスクを1つに絞り、具体的な手順を200字以内で。',
    proj_papa:'パパへのLINE依頼文を作ってください。やること・期日を明確に。返信不要レベルで具体的に。',
    proj_all: 'このプロジェクトの残タスクを整理して、誰がいつまでに何をするか箇条書きで。',
    inv_add:  '名もなき家事をタスク化してください。担当者（ママ/パパ/二人で）と期日を含めて。',
    inv_papa: '名もなき家事のうちパパでもできるものを選び、パパへの依頼文を作ってください。',
    inv_sort: '名もなき家事を優先順位付きでリストアップしてください（高/中/低）。',
    free:     '相談に乗ります。',
  };
  const content=topicMap[key]||(choiceText?`${choiceText}について相談したい`:key);
  chatHistory.push({role:'user',content});
  await callAI();
}

function addChoices(choices){
  const cb=document.getElementById('chat-body'); if(!cb) return;
  const w=document.createElement('div'); w.className='cwrap anim';
  choices.forEach(c=>{
    const btn=document.createElement('button'); btn.className='cbtn';
    const ic=document.createElement('span'); ic.className='cicon'; ic.textContent=c.icon;
    btn.append(ic,c.text);
    btn.addEventListener('click',()=>handleChoice(c.key,c.extra||null,w,c.text));
    w.appendChild(btn);
  });
  cb.appendChild(w); scrollChat();
}

}

// ─── aiService: AI呼び出し抽象レイヤー ───────────────
// provider を差し替えるだけでAIを切り替え可能
const aiService = {
  provider: 'anthropic', // 'anthropic' | 'mock'

  async call(messages, system) {
    if(this.provider === 'mock') return this._mock(messages);
    return this._anthropic(messages, system);
  },

  async _anthropic(messages, system) {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({messages, system})
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || 'サーバーエラー');
    return data.text || '(返答なし)';
  },

  async _mock(messages) {
    await new Promise(r => setTimeout(r, 800));
    const last = messages[messages.length-1]?.content || '';
    if(last.includes('献立') || last.includes('食材'))
      return '🍽️ デモ提案：鶏肉と野菜の炒め物\n\n材料：鶏もも肉200g、キャベツ1/4、にんじん1/2\n調理時間：20分\n担当：ママ\n\n※Proプラン（APIキー設定）でリアルな提案になります。';
    if(last.includes('タスク') || last.includes('パパ'))
      return '📋 デモ提案：今週のパパタスク\n\n1. ゴミ出し（月・木）\n2. 週末の買い物\n3. お風呂担当（週末）\n\n※Proプランで家族情報に基づいた提案になります。';
    return '🤖 これはデモ応答です。\n\nProプランを有効にすると、家族の状況に合わせた具体的な提案が届きます。\n\n設定画面からAPIキーを設定してください。';
  }
};

// ─── callAI: チャット送信 ───────────────────────────
async function callAI(){
  document.getElementById('lveil').classList.add('on');
  document.getElementById('send-btn').disabled=true;
  try{
    // プランチェック
    const _s = await loadST();
    if(!_s.prefs.isPro){
      document.getElementById('lveil').classList.remove('on');
      document.getElementById('send-btn').disabled=false;
      addAI('AI機能はProプランでご利用いただけます 🔒\n\nAPIキー設定で全機能が使えます。\nデモモードで試すこともできます。');
      setTimeout(()=>addChoices([
        {icon:'⚙️', text:'設定を開く',         key:'open_settings'},
        {icon:'🎭', text:'デモモードで試す',    key:'demo_mode'},
        {icon:'🏠', text:'ホームに戻る',        key:'home'},
      ]),400);
      return;
    }

    const sys = await buildSys();
    const raw = chatHistory.filter(m=>m&&m.role&&m.content);
    const msgs = [];
    for(const m of raw){
      if(msgs.length===0 && m.role!=='user') continue;
      if(msgs.length>0 && msgs[msgs.length-1].role===m.role) msgs[msgs.length-1]=m;
      else msgs.push({role:m.role, content:String(m.content)});
    }
    if(!msgs.length) throw new Error('メッセージがありません');

    const reply = await aiService.call(msgs, sys);
    addAI(reply);
    chatHistory.push({role:'assistant', content:reply});
    setTimeout(()=>addChoices([
      {icon:'📅',text:'TimeTreeにタスク追加する',key:'done'},
      {icon:'🔄',text:'別の提案をしてほしい',   key:'free'},
      {icon:'🏠',text:'ホームに戻る',           key:'home'},
    ]),500);
  }catch(e){
    addAI('エラー: '+e.message);
    setTimeout(()=>addChoices([
      {icon:'🔄',text:'もう一度試す',key:'restart'},
      {icon:'🏠',text:'ホームに戻る',key:'home'},
    ]),400);
  }finally{
    document.getElementById('lveil').classList.remove('on');
    document.getElementById('send-btn').disabled=false;
  }
}

document.getElementById('send-btn').addEventListener('click', sendMsg);

async function sendMsg(){
  const el=document.getElementById('chat-ta');
  const txt=el.value.trim(); if(!txt) return;
  el.value=''; el.style.height='auto';
  addUser(txt);
  chatHistory.push({role:'user',content:txt});
  await callAI();
}

document.getElementById('mic-btn').addEventListener('click',()=>{

  document.getElementById('mic-btn').classList.toggle('on',micOn);
  if(micOn){
    toast('🎤 音声入力中...');

function addAI(text){
  if(!text) text = '...';
  const cb=document.getElementById('chat-body'); if(!cb) return;
  const d=document.createElement('div'); d.className='msg ai anim';
  const bub=document.createElement('div'); bub.className='bub';
  const tm=document.createElement('div'); tm.className='mtime'; tm.textContent=timeStr();
  d.append(bub,tm); cb.appendChild(d);
  let i=0; bub.textContent='';
  (function type(){ if(i>=text.length){scrollChat();return;} bub.textContent+=text[i++]; setTimeout(type,i<30?4:11); })();
  scrollChat();
}
function addUser(text){
  if(!text) return;
  const cb=document.getElementById('chat-body'); if(!cb) return;
  const d=document.createElement('div'); d.className='msg user anim';
  const bub=document.createElement('div'); bub.className='bub'; bub.textContent=text;
  const tm=document.createElement('div'); tm.className='mtime'; tm.textContent=timeStr();
  d.append(bub,tm); cb.appendChild(d); scrollChat();
}
function scrollChat(){ const cb=document.getElementById('chat-body'); if(cb) setTimeout(()=>cb.scrollTo({top:cb.scrollHeight,behavior:'smooth'}),80); }
