<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Instagram アイコン候補</title>
<style>
  body {
    background: #1a1a1a;
    color: #eee;
    font-family: -apple-system, sans-serif;
    padding: 40px;
    margin: 0;
  }
  h1 { text-align: center; margin-bottom: 8px; font-size: 22px; }
  p.sub { text-align: center; color: #888; margin-bottom: 40px; font-size: 14px; }
  .grid {
    display: flex;
    flex-wrap: wrap;
    gap: 40px;
    justify-content: center;
  }
  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .card h2 {
    font-size: 14px;
    color: #aaa;
    margin: 0;
    text-align: center;
  }
  .sizes {
    display: flex;
    align-items: flex-end;
    gap: 16px;
  }
  .sizes svg { border-radius: 20%; }
  .label {
    font-size: 11px;
    color: #666;
    text-align: center;
    margin-top: 4px;
  }
  .size-wrap { display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>

<h1>Instagram アイコン候補</h1>
<p class="sub">育児 × ママ × AI開発 ／ 黒背景・顔なし・1024×1024</p>

<div class="grid">

  <!-- ===== 1: コードゆりかご ===== -->

    <h2>① コードゆりかご<br><small style="color:#666">コード括弧がゆりかごに</small></h2>
    <div class="sizes">
      <div class="size-wrap">

          <!-- ゆりかご本体（括弧） -->
          <path d="M220 300 Q160 512 220 724" stroke="#4af" stroke-width="52" fill="none" stroke-linecap="round"/>
          <path d="M804 300 Q864 512 804 724" stroke="#4af" stroke-width="52" fill="none" stroke-linecap="round"/>
          <!-- ゆりかご底面 -->
          <path d="M200 724 Q512 820 824 724" stroke="#4af" stroke-width="48" fill="none" stroke-linecap="round"/>
          <!-- ゆりかごロッカー -->
          <path d="M300 820 Q512 900 724 820" stroke="#4af" stroke-width="36" fill="none" stroke-linecap="round"/>
          <!-- 回路ドット -->
          <circle cx="512" cy="460" r="36" fill="#4af"/>
          <line x1="512" y1="424" x2="512" y2="340" stroke="#4af" stroke-width="20"/>
          <circle cx="512" cy="320" r="20" fill="none" stroke="#4af" stroke-width="18"/>
          <!-- スラッシュ（コード感） -->
          <text x="512" y="570" text-anchor="middle" font-family="monospace" font-size="96" fill="#4af" opacity="0.35">/&gt;</text>
        </svg>
        <div class="label">200px</div>
      </div>
      <div class="size-wrap">
        <svg width="80" height="80" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
          <rect width="1024" height="1024" fill="#000"/>
          <path d="M220 300 Q160 512 220 724" stroke="#4af" stroke-width="52" fill="none" stroke-linecap="round"/>
          <path d="M804 300 Q864 512 804 724" stroke="#4af" stroke-width="52" fill="none" stroke-linecap="round"/>
          <path d="M200 724 Q512 820 824 724" stroke="#4af" stroke-width="48" fill="none" stroke-linecap="round"/>
          <path d="M300 820 Q512 900 724 820" stroke="#4af" stroke-width="36" fill="none" stroke-linecap="round"/>
          <circle cx="512" cy="460" r="36" fill="#4af"/>
          <line x1="512" y1="424" x2="512" y2="340" stroke="#4af" stroke-width="20"/>
          <circle cx="512" cy="320" r="20" fill="none" stroke="#4af" stroke-width="18"/>
        </svg>
        <div class="label">80px</div>
      </div>
      <div class="size-wrap">
        <svg width="40" height="40" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">

          <circle cx="512" cy="460" r="36" fill="#4af"/>
        </svg>
        <div class="label">40px</div>
      </div>
    </div>
  </div>

          <rect x="100" y="196" width="824" height="36" fill="#222"/>

          <circle cx="176" cy="196" r="20" fill="#f55"/>
          <circle cx="236" cy="196" r="20" fill="#fa0"/>
          <circle cx="296" cy="196" r="20" fill="#4c4"/>
          <!-- コード行 -->
          <text x="148" y="332" font-family="monospace" font-size="72" fill="#4af">$ raise --baby</text>
          <text x="148" y="432" font-family="monospace" font-size="60" fill="#888">mode: <tspan fill="#4c4">ai-mama</tspan></text>
          <text x="148" y="524" font-family="monospace" font-size="60" fill="#888">sleep: <tspan fill="#f88">0h</tspan></text>
          <text x="148" y="616" font-family="monospace" font-size="60" fill="#888">love: <tspan fill="#f4f">∞</tspan></text>
          <!-- カーソル -->
          <rect x="148" y="648" width="36" height="60" fill="#4af" opacity="0.8"/>
        </svg>
        <div class="label">200px</div>
      </div>
      <div class="size-wrap">
        <svg width="80" height="80" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
          <rect width="1024" height="1024" fill="#000"/>
          <rect x="100" y="160" width="824" height="620" rx="48" ry="48" fill="#111" stroke="#333" stroke-width="16"/>
          <rect x="100" y="160" width="824" height="72" rx="48" ry="48" fill="#222"/>
          <rect x="100" y="196" width="824" height="36" fill="#222"/>

          <circle cx="236" cy="196" r="20" fill="#fa0"/>

      <div class="size-wrap">
