<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>HAKOBU Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#08080c;font-family:'Noto Sans JP',sans-serif;color:#e8ecf2}
:root{--bg:#08080c;--card:#111318;--card2:#191d24;--bdr:#252a33;--t1:#e8ecf2;--t2:#8b95a5;--t3:#4a5568;--teal:#3EC9C0;--navy:#1D3D5C}
.wrap{max-width:720px;margin:0 auto;padding:16px 12px 90px}
.hdr{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.hdr-logo{width:36px;height:36px;background:var(--navy);border-radius:10px;display:flex;align-items:center;justify-content:center}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:14px}
.stat{background:var(--card);border-radius:12px;padding:10px 4px;text-align:center;border:1px solid var(--bdr)}
.stat-v{font-size:20px;font-weight:900}
.stat-l{font-size:8px;color:var(--t3);font-weight:600}
.bar{background:var(--bdr);border-radius:6px;height:6px;margin-bottom:16px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--teal),#22C55E);border-radius:6px;transition:width .4s}
.tabs{display:flex;gap:3px;margin-bottom:16px;overflow-x:auto}
.tab{padding:7px 14px;border-radius:18px;border:none;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;background:var(--card);color:var(--t2)}
.tab.on{background:var(--teal);color:#000}
.section{display:none}.section.on{display:block}
.phase{margin-bottom:6px}
.phase-hdr{background:var(--card);border-radius:12px;padding:11px 13px;cursor:pointer;border:1px solid var(--bdr);display:flex;align-items:center;gap:8px}
.phase-hdr.open{border-radius:12px 12px 0 0}
.phase-body{background:var(--card2);border-radius:0 0 12px 12px;border:1px solid var(--bdr);border-top:none;display:none}
.phase-body.open{display:block}
.task-row{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--bdr)}
.task-row:last-child{border-bottom:none}
.chk{width:18px;height:18px;border-radius:5px;border:2px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;cursor:pointer;flex-shrink:0}
.chk.done{background:#22C55E;border-color:#22C55E}
.prio{font-size:8px;font-weight:700;padding:1px 5px;border-radius:4px;flex-shrink:0}
.gen-btn{font-size:8px;padding:2px 6px;border-radius:4px;border:none;background:var(--teal);color:#000;font-weight:700;cursor:pointer;flex-shrink:0}
.acc{margin-bottom:6px}
.acc-hdr{background:var(--card);border-radius:12px;padding:11px 14px;cursor:pointer;border:1px solid var(--bdr)}
.acc-hdr.open{border-radius:12px 12px 0 0}
.acc-body{background:var(--card2);border-radius:0 0 12px 12px;padding:6px 0;border:1px solid var(--bdr);border-top:none;display:none}
.acc-body.open{display:block}
.acc-item{padding:5px 14px;font-size:11px;border-bottom:1px solid var(--bdr);line-height:1.5}
.acc-item:last-child{border-bottom:none}
.card-cat{font-size:13px;font-weight:900;margin-bottom:2px}
.card-logic{font-size:10px;color:var(--t2);margin-bottom:8px;line-height:1.6;background:var(--card);border-radius:8px;padding:6px 10px}
.card-item{margin-bottom:4px}
.card-hdr{background:var(--card);border-radius:10px;padding:9px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;border:1px solid var(--bdr)}
.card-hdr.open{border-radius:10px 10px 0 0}
.card-body{background:var(--card2);border-radius:0 0 10px 10px;border:1px solid var(--bdr);border-top:none;display:none}
.card-body.open{display:block}
.card-task{display:flex;align-items:flex-start;gap:8px;padding:5px 12px;border-bottom:1px solid var(--bdr);font-size:11px;line-height:1.5}
.card-task:last-child{border-bottom:none}
.gen-panel{background:var(--card2);border-radius:14px;padding:14px 16px;border:1px solid var(--bdr);margin-bottom:10px}
.gen-prompt{font-size:10px;line-height:1.8;white-space:pre-wrap;font-family:'Courier New',monospace;background:var(--bg);border-radius:8px;padding:12px;color:var(--t1)}
.copy-btn{font-size:10px;padding:4px 10px;border-radius:6px;border:none;background:var(--teal);color:#000;font-weight:700;cursor:pointer}
</style>
</head>

  const tabs=[{id:"roadmap",l:"📋 ロードマップ"},{id:"cards",l:"🃏 提案カード"},{id:"spec",l:"⚙️ 仕様"},{id:"screens",l:"📱 画面"},{id:"generate",l:"🤖 指示生成"}];
  h+=`<div class="tabs">`;
  tabs.forEach(t=>{h+=`<button class="tab${currentTab===t.id?' on':''}" onclick="switchTab('${t.id}')">${t.l}</button>`;});
  h+=`</div>`;

  // ═══ ROADMAP ═══
  h+=`<div class="section${currentTab==='roadmap'?' on':''}">`;
  PHASES.forEach(p=>{
    const d2=p.tasks.filter(t=>t.done).length,t2=p.tasks.length;
    const c2=p.tasks.filter(t=>t.p==="最優先"&&!t.done).length;
    const pp=t2?Math.round(d2/t2*100):0;
    const isOpen=openPhaseId===p.id;
    h+=`<div class="phase"><div class="phase-hdr${isOpen?' open':''}" style="border-left:3px solid ${p.color}" onclick="togglePhase(${p.id})">`;
    h+=`<span style="font-size:16px">${p.icon}</span><div style="flex:1"><div style="display:flex;align-items:center;gap:5px"><span style="font-size:9px;color:${p.color};font-weight:800">Phase ${p.id}</span><span style="font-size:12px;font-weight:800;color:#fff">${esc(p.name)}</span><span style="font-size:9px;color:${S.t3}">${esc(p.desc)}</span></div></div>`;
    h+=`<div style="text-align:right;min-width:40px"><div style="font-size:14px;font-weight:900;color:${pp===100?'#22C55E':'#fff'}">${pp}%</div><div style="font-size:8px;color:${S.t3}">${d2}/${t2}</div></div>`;
    if(c2>0)h+=`<div style="width:18px;height:18px;border-radius:50%;background:#EF4444;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:#fff">${c2}</div>`;
    h+=`</div><div style="background:${S.bdr};border-radius:3px;height:3px;margin:-1px 14px 0;overflow:hidden"><div style="height:100%;width:${pp}%;background:${p.color};border-radius:3px"></div></div>`;
    h+=`<div class="phase-body${isOpen?' open':''}">`;
    p.tasks.forEach((t,i)=>{
      const pc=PCM[t.p]||'#666';
      h+=`<div class="task-row"><div class="chk${t.done?' done':''}" onclick="toggleTask(${p.id},${i})">${t.done?'✓':''}</div>`;
      h+=`<div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:600;color:${t.done?S.t3:S.t1};${t.done?'text-decoration:line-through':''}">${esc(t.name)}</div><div style="font-size:9px;color:${S.t3};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.hint)}</div></div>`;
      h+=`<span class="prio" style="background:${pc}22;color:${pc}">${t.p}</span>`;
      if(t.file==='index.html')h+=`<button class="gen-btn" onclick="event.stopPropagation();openGen(${p.id},${i})">指示</button>`;
      h+=`</div>`;
    });
    h+=`</div></div>`;
  });
  h+=`</div>`;

  // ═══ CARDS ═══
  h+=`<div class="section${currentTab==='cards'?' on':''}">`;
  CARDS_DATA.forEach((cat,ci)=>{
    h+=`<div style="margin-bottom:12px"><div class="card-cat" style="color:${cat.catColor}">${esc(cat.cat)}</div>`;
    h+=`<div style="font-size:10px;color:${S.t3};margin-bottom:4px">関数: ${esc(cat.fn)}</div>`;
    h+=`<div class="card-logic">${esc(cat.logic)}</div>`;
    cat.cards.forEach((card,ki)=>{
      const cKey=ci+'-'+ki;
      const isOpen=openAccId===cKey;
      h+=`<div class="card-item"><div class="card-hdr${isOpen?' open':''}" style="border-left:3px solid ${card.color}" onclick="toggleAcc('${cKey}')">`;
      h+=`<span style="font-size:14px">${card.icon||''}</span><div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:700;color:#fff">${esc(card.name)}</div>`;
      let meta=[];
      if(card.month)meta.push(card.month+'月'+(card.day?card.day+'日':''));
      if(card.target)meta.push('対象:'+card.target);
      if(card.trigger)meta.push(card.trigger);
      if(card.partner)meta.push(card.partner);
      if(card.childPhase)meta.push('条件:'+card.childPhase);
      h+=`<div style="font-size:9px;color:${S.t3}">${esc(meta.join(' | '))}</div></div>`;
      h+=`<span style="font-size:9px;color:${S.t3};flex-shrink:0">${card.tasks.length}件 ${isOpen?'▲':'▼'}</span></div>`;
      h+=`<div class="card-body${isOpen?' open':''}">`;
      card.tasks.forEach(task=>{
        const isMeta=typeof task==='string'&&task.charAt(0)==='[';
        h+=`<div class="card-task"><span style="color:${card.color};flex-shrink:0;font-size:10px;margin-top:2px">•</span><span style="color:${isMeta?S.teal:S.t1}">${esc(task)}</span></div>`;
      });
      h+=`</div></div>`;
    });
    h+=`</div>`;
  });
  h+=`</div>`;

  // ═══ SPEC ═══
  h+=`<div class="section${currentTab==='spec'?' on':''}">`;
  Object.entries(TECH_SPEC).forEach(([key,spec])=>{
    const isOpen=openAccId===key;
    h+=`<div class="acc"><div class="acc-hdr${isOpen?' open':''}" onclick="toggleAcc('${key}')"><div style="font-size:13px;font-weight:800;color:#fff">${esc(spec.label)}</div><div style="font-size:9px;color:${S.t3}">${spec.items.length}項目</div></div>`;
    h+=`<div class="acc-body${isOpen?' open':''}">`;
    spec.items.forEach(item=>{
      const isNew=item.startsWith('[新]');
      h+=`<div class="acc-item" style="color:${isNew?S.teal:S.t1};${key==='dataModel'?'font-family:Courier New,monospace':''}${isNew?';font-weight:700':''}">${esc(item)}</div>`;
    });
    h+=`</div></div>`;
  });
  h+=`</div>`;

  // ═══ SCREENS ═══
  h+=`<div class="section${currentTab==='screens'?' on':''}">`;
  SCREENS.forEach(scr=>{
    const isOpen=openAccId===scr.id;
    h+=`<div class="acc"><div class="acc-hdr${isOpen?' open':''}" onclick="toggleAcc('${scr.id}')"><div style="font-size:13px;font-weight:800;color:#fff">${esc(scr.name)}</div><div style="font-size:10px;color:${S.t3};margin-top:2px">${esc(scr.desc)}</div></div>`;
    h+=`<div class="acc-body${isOpen?' open':''}">`;
    scr.fields.forEach(f=>{h+=`<div class="acc-item">${esc(f)}</div>`;});
    h+=`</div></div>`;
  });
  h+=`</div>`;

  // ═══ GENERATE ═══
  h+=`<div class="section${currentTab==='generate'?' on':''}">`;
  h+=`<div style="font-size:12px;color:${S.t2};margin-bottom:12px;line-height:1.6">タスクを選ぶとClaude Code用の指示を自動生成。ロードマップの「指示」ボタンからも飛べます。</div>`;
  if(!genTaskData){
    PHASES.filter(p=>p.tasks.some(t=>!t.done&&t.file==='index.html')).forEach(p=>{
      h+=`<div style="margin-bottom:10px"><div style="font-size:11px;font-weight:800;color:${p.color};margin-bottom:6px">${p.icon} Phase ${p.id}: ${esc(p.name)}</div>`;
      p.tasks.filter(t=>!t.done&&t.file==='index.html').forEach((t,i)=>{
        const idx=p.tasks.indexOf(t);
        const pc=PCM[t.p]||'#666';
        h+=`<div style="background:${S.card};border-radius:10px;padding:9px 12px;margin-bottom:4px;cursor:pointer;border:1px solid ${S.bdr};display:flex;align-items:center;gap:8px" onclick="openGen(${p.id},${idx})">`;
        h+=`<span class="prio" style="background:${pc}22;color:${pc}">${t.p}</span><span style="font-size:12px;font-weight:600;color:#fff;flex:1">${esc(t.name)}</span><span style="font-size:9px;color:${S.t3}">→ 生成</span></div>`;
      });
      h+=`</div>`;
    });
  } else {
    const {task,phase}=genTaskData;
    const prompt=genPrompt(task,phase);
    h+=`<button onclick="genTaskData=null;render()" style="font-size:11px;color:${S.teal};background:none;border:none;cursor:pointer;font-family:inherit;font-weight:700;margin-bottom:10px">← タスク選択に戻る</button>`;
    h+=`<div style="background:${S.card};border-radius:14px;padding:14px 16px;margin-bottom:10px;border-left:3px solid ${phase.color}"><div style="font-size:9px;color:${phase.color};font-weight:800">Phase ${phase.id}: ${esc(phase.name)}</div><div style="font-size:16px;font-weight:900;color:#fff;margin:4px 0">${esc(task.name)}</div><div style="font-size:10px;color:${S.t3}">ファイル: ${esc(task.file)} / 関数: ${esc(task.fn)}</div></div>`;
    h+=`<div class="gen-panel"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><div style="font-size:12px;font-weight:800;color:${S.teal}">Claude Code 指示（コピペ用）</div><button class="copy-btn" onclick="copyPrompt()">📋 コピー</button></div>`;
    h+=`<pre class="gen-prompt">${esc(prompt)}</pre></div>`;
    h+=`<div style="display:flex;gap:6px"><button onclick="markDone()" style="flex:1;padding:10px;border-radius:10px;border:none;background:#22C55E;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">✓ 完了にする</button>`;
    h+=`<button onclick="nextTask()" style="flex:1;padding:10px;border-radius:10px;border:1px solid ${S.bdr};background:none;color:${S.t2};font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">次のタスクへ →</button></div>`;
  }
  h+=`</div>`;

  app.innerHTML=h;
}

function genPrompt(task,phase){
  let p='# HAKOBU: '+task.name+'\n\n';
  p+='## 概要\n'+task.hint+'\n\n';
  if(task.file&&task.file!=='-'&&task.file!=='外部')p+='## 対象ファイル\n'+task.file+'\n\n';
  if(task.fn&&task.fn!=='-')p+='## 対象箇所\n'+task.fn+'\n\n';
  p+='## 指示\n';
  if(task.file==='index.html')p+=task.file+' を開いて、';
  p+='以下の修正を行ってください。\n\n'+task.hint+'\n\n';
  p+='## ルール（CLAUDE.md参照）\n- 単一HTMLファイル構成を維持\n- 絵文字アイコン禁止（Lucide Icons使用）\n- onclick属性禁止（addEventListener使用）\n- ユーザー入力のinnerHTML表示時はescHtml()でエスケープ\n- ブランドカラー: Teal #3EC9C0\n\n';
  p+='## 完了後\nPROGRESS.md の Phase '+phase.id+'「'+task.name+'」にチェックを入れてください。';
  return p.replace(/\\n/g,'\n');
}

function switchTab(id){currentTab=id;openAccId=null;genTaskData=null;render();}
function togglePhase(id){openPhaseId=openPhaseId===id?null:id;render();}
function toggleAcc(id){openAccId=openAccId===id?null:id;render();}
function toggleTask(phaseId,idx){
  const p=PHASES.find(p=>p.id===phaseId);
  if(p)p.tasks[idx].done=!p.tasks[idx].done;
  render();
}
function openGen(phaseId,idx){
  const phase=PHASES.find(p=>p.id===phaseId);
  if(!phase)return;
  genTaskData={task:phase.tasks[idx],phase};
  currentTab='generate';
  render();
}
function copyPrompt(){
  if(!genTaskData)return;
  const text=genPrompt(genTaskData.task,genTaskData.phase).replace(/\n/g,'\n');
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.querySelector('.copy-btn');
    if(btn){btn.textContent='✓ コピー済み';btn.style.background='#22C55E';setTimeout(()=>{btn.textContent='📋 コピー';btn.style.background='';},2000);}
  });
}
function markDone(){
  if(!genTaskData)return;
  genTaskData.task.done=true;
  genTaskData=null;
  render();
}
function nextTask(){
  if(!genTaskData)return;
  const {task,phase}=genTaskData;
  const idx=phase.tasks.indexOf(task);
  const next=phase.tasks.find((t,i)=>i>idx&&!t.done&&t.file==='index.html');
  if(next)genTaskData={task:next,phase};
  else genTaskData=null;
  render();
}

render();
</script>
</body>
</html>
